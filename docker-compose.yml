version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: transitops-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transitops
    ports:
      - "5432:5432"
    volumes:
      - transitops_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  transitops_data: